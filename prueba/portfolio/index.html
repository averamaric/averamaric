        /* ===== VARIABLES ===== */
        :root {
            --gold: #c5a044;
            --gold-light: #e5c77c;
            --beige: #f5f0e3;
            --light-bg: #faf9f6;
            --dark: #1a1a1a;
            --dark-gray: #2c2c2c;
            --font-serif: 'Prata', serif;
            --font-sans: 'Montserrat', sans-serif;
            --transition-smooth: all 0.6s cubic-bezier(0.25, 0.1, 0.15, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: #fff;
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.3);
            backdrop-filter: blur(8px);
            z-index: 1000;
            transition: background 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(10, 10, 10, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            color: white;
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 4px;
            border-right: 1px solid var(--gold);
            padding-right: 1rem;
            transition: var(--transition-smooth);
        }

        .logo-text:hover {
            letter-spacing: 6px;
        }

        .nav-menu {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-menu a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 2px;
            transition: color 0.3s ease;
            padding-bottom: 4px;
            border-bottom: 1px solid transparent;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: white;
            border-bottom-color: var(--gold);
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        
        .dropdown-trigger {
            cursor: pointer;
        }
        
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            min-width: 180px;
            border-radius: 4px;
            padding: 0.5rem 0;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            list-style: none;
            border: 1px solid rgba(197, 160, 68, 0.2);
        }
        
        .dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            top: calc(100% + 5px);
        }
        
        .dropdown-menu li {
            margin: 0;
            padding: 0;
        }
        
        .dropdown-menu a {
            display: block;
            padding: 0.8rem 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            border-bottom: none !important;
            white-space: nowrap;
            text-align: left;
        }
        
        .dropdown-menu a:hover {
            background: rgba(197, 160, 68, 0.1);
            color: white;
            padding-left: 2rem;
        }
        
        .dropdown-menu a.active {
            color: var(--gold);
            background: rgba(197, 160, 68, 0.05);
        }
        
        /* Flecha indicadora del dropdown */
        .dropdown-trigger::after {
            content: '▾';
            margin-left: 5px;
            font-size: 0.8rem;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .dropdown:hover .dropdown-trigger::after {
            transform: rotate(180deg);
        }
        
        /* Responsive para móvil */
        @media (max-width: 968px) {
            .dropdown {
                position: static;
            }
            
            .dropdown-menu {
                position: static;
                transform: none;
                background: transparent;
                backdrop-filter: none;
                box-shadow: none;
                opacity: 1;
                visibility: visible;
                display: none;
                padding: 0;
                margin-top: 0.5rem;
                border: none;
            }
            
            .dropdown:hover .dropdown-menu {
                display: block;
            }
            
            .dropdown-menu a {
                padding: 0.5rem 2rem;
                font-size: 0.75rem;
            }
            
            .dropdown-menu a:hover {
                padding-left: 2.5rem;
            }
        }
        /* ===== HEADER ===== */
        .portfolio-header {
            height: 60vh;
            min-height: 400px;
            background-image: url('images/WhatsApp Image 2026-03-06 at 16.22.33.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .portfolio-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 1;
        }

        .portfolio-header-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 0 2rem;
        }

        .portfolio-header .number {
            color: var(--gold);
            font-size: 1rem;
            letter-spacing: 10px;
            display: block;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .portfolio-header h1 {
            font-family: var(--font-serif);
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 400;
            margin-bottom: 1rem;
            line-height: 1.1;
            letter-spacing: 4px;
        }

        .portfolio-header .subhead {
            font-size: 1.2rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
        }

        /* ===== FILTROS ===== */
        .filters-section {
            padding: 40px 2rem 20px;
            text-align: center;
        }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #999;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .filter-btn:hover {
            color: var(--gold);
        }

        .filter-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ===== COLLAGE ASIMÉTRICO ===== */
        .portfolio-grid {
            padding: 40px 2rem 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .masonry {
            column-count: 4;
            column-gap: 20px;
            break-inside: avoid;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .masonry-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3);
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.8s ease;
        }

        .masonry-item:hover img {
            transform: scale(1.05);
        }

        /* Overlay con información MEJORADO con BRAND */
        .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.3) 80%);
            color: white;
            padding: 2rem 1.5rem 1.5rem;
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .masonry-item:hover .item-overlay {
            opacity: 1;
        }

        .item-brand {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }

        .item-title {
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .item-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 0.5rem;
        }

        .item-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--gold);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 2;
            font-weight: 600;
        }

        /* Badge de marca destacada (para marcas muy conocidas) */
        .item-brand-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            color: var(--gold);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            font-weight: 600;
            border: 1px solid var(--gold);
            z-index: 2;
        }

        /* ===== LIGHTBOX MEJORADO ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 1200px;
            max-height: 90vh;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            width: 40px;
            height: 40px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lightbox-close:hover {
            transform: rotate(90deg);
        }

        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(197, 160, 68, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-prev:hover,
        .lightbox-next:hover {
            background: var(--gold);
        }

        .lightbox-prev {
            left: -70px;
        }

        .lightbox-next {
            right: -70px;
        }

        .lightbox-info {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            padding: 0 10px;
        }

        .lightbox-brand {
            font-family: var(--font-serif);
            color: var(--gold);
            font-size: 1.2rem;
        }

        .lightbox-desc {
            opacity: 0.8;
        }

        /* ===== FOOTER ===== */
        .footer {
            background-color: #1e1e1e;
            color: #aaa;
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .masonry {
                column-count: 3;
            }
        }

        @media (max-width: 968px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-menu {
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }

            .masonry {
                column-count: 2;
            }

            .lightbox-prev {
                left: 10px;
            }

            .lightbox-next {
                right: 10px;
            }

            .lightbox-info {
                flex-direction: column;
                bottom: -80px;
                gap: 5px;
            }
        }

        @media (max-width: 600px) {
            .masonry {
                column-count: 1;
            }

            .portfolio-header h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

        let currentFilter = 'all';
        let currentImages = [];
        let currentIndex = 0;

        // Renderizar grid
        function renderGrid(filter = 'all') {
            const grid = document.getElementById('masonryGrid');
            const filteredItems = filter === 'all' 
                ? portfolioItems 
                : portfolioItems.filter(item => item.category === filter);
            
            grid.innerHTML = '';
            
            filteredItems.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `masonry-item ${item.size || ''}`;
                itemDiv.setAttribute('data-category', item.category);
                itemDiv.setAttribute('data-index', index);
                itemDiv.onclick = () => openLightbox(index, filteredItems);
                
                // Badge de marca destacada (opcional)
                const brandBadge = item.featured ? 
                    `<div class="item-brand-badge">${item.brand}</div>` : '';
                
                itemDiv.innerHTML = `
                    <img src="${item.src}" alt="${item.title}" loading="lazy">
                    <span class="item-tag">${item.category}</span>
                    ${brandBadge}
                    <div class="item-overlay">
                        <div class="item-brand">${item.brand}</div>
                        <div class="item-title">${item.title}</div>
                        <div class="item-category">${item.description}</div>
                    </div>
                `;
                
                grid.appendChild(itemDiv);
            });

            currentImages = filteredItems;
        }

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.getAttribute('data-filter');
                renderGrid(currentFilter);
            });
        });

        // Lightbox mejorado
        function openLightbox(index, images) {
            currentIndex = index;
            currentImages = images;
            
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            const brand = document.getElementById('lightboxBrand');
            const desc = document.getElementById('lightboxDesc');
            
            img.src = images[index].src;
            img.alt = images[index].title;
            brand.textContent = images[index].brand;
            desc.textContent = `${images[index].title} — ${images[index].description}`;
            
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function changeImage(direction) {
            currentIndex += direction;
            
            if (currentIndex < 0) {
                currentIndex = currentImages.length - 1;
            } else if (currentIndex >= currentImages.length) {
                currentIndex = 0;
            }
            
            const img = document.getElementById('lightboxImg');
            const brand = document.getElementById('lightboxBrand');
            const desc = document.getElementById('lightboxDesc');
            
            img.src = currentImages[currentIndex].src;
            img.alt = currentImages[currentIndex].title;
            brand.textContent = currentImages[currentIndex].brand;
            desc.textContent = `${currentImages[currentIndex].title} — ${currentImages[currentIndex].description}`;
        }

        // Teclas
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowLeft' && document.getElementById('lightbox').classList.contains('active')) {
                changeImage(-1);
            } else if (e.key === 'ArrowRight' && document.getElementById('lightbox').classList.contains('active')) {
                changeImage(1);
            }
        });

        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 1000,
                once: true,
                offset: 100,
                easing: 'ease-out-cubic'
            });

            renderGrid('all');

            const navbar = document.querySelector('.navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        });
    </script>
