<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio · M&A Tex</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Prata&display=swap" rel="stylesheet">
    
    <!-- AOS Library CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --gold: #c5a044;
            --gold-light: #e5c77c;
            --beige: #f5f0e3;
            --light-bg: #faf9f6;
            --dark: #1a1a1a;
            --dark-gray: #2c2c2c;
            --font-serif: 'Prata', serif;
            --font-sans: 'Montserrat', sans-serif;
            --transition-smooth: all 0.6s cubic-bezier(0.25, 0.1, 0.15, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: #fff;
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.3);
            backdrop-filter: blur(8px);
            z-index: 1000;
            transition: background 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(10, 10, 10, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            color: white;
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 4px;
            border-right: 1px solid var(--gold);
            padding-right: 1rem;
            transition: var(--transition-smooth);
        }

        .logo-text:hover {
            letter-spacing: 6px;
        }

        .nav-menu {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-menu a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 2px;
            transition: color 0.3s ease;
            padding-bottom: 4px;
            border-bottom: 1px solid transparent;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: white;
            border-bottom-color: var(--gold);
        }

        /* ===== HEADER ===== */
        .portfolio-header {
            height: 60vh;
            min-height: 400px;
            background-image: url('assets/images/13.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .portfolio-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 1;
        }

        .portfolio-header-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 0 2rem;
        }

        .portfolio-header .number {
            color: var(--gold);
            font-size: 1rem;
            letter-spacing: 10px;
            display: block;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .portfolio-header h1 {
            font-family: var(--font-serif);
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 400;
            margin-bottom: 1rem;
            line-height: 1.1;
            letter-spacing: 4px;
        }

        .portfolio-header .subhead {
            font-size: 1.2rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
        }

        /* ===== FILTROS (OPCIONAL) ===== */
        .filters-section {
            padding: 40px 2rem 20px;
            text-align: center;
        }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #999;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .filter-btn:hover {
            color: var(--gold);
        }

        .filter-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ===== COLLAGE ASIMÉTRICO (MASONRY) ===== */
        .portfolio-grid {
            padding: 40px 2rem 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .masonry {
            column-count: 4;
            column-gap: 20px;
            break-inside: avoid;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .masonry-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3);
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.8s ease;
        }

        .masonry-item:hover img {
            transform: scale(1.05);
        }

        /* Tamaños específicos para crear asimetría */
        .masonry-item.tall {
            grid-row: span 2;
        }

        .masonry-item.wide {
            grid-column: span 2;
        }

        /* Overlay con información */
        .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            padding: 2rem 1.5rem 1.5rem;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .masonry-item:hover .item-overlay {
            opacity: 1;
        }

        .item-overlay h3 {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
        }

        .item-overlay p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .item-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--gold);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* ===== LIGHTBOX (MODAL PARA VER IMÁGENES) ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 1200px;
            max-height: 90vh;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            width: 40px;
            height: 40px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lightbox-close:hover {
            transform: rotate(90deg);
        }

        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(197, 160, 68, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-prev:hover,
        .lightbox-next:hover {
            background: var(--gold);
        }

        .lightbox-prev {
            left: -70px;
        }

        .lightbox-next {
            right: -70px;
        }

        .lightbox-info {
            position: absolute;
            bottom: -40px;
            left: 0;
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* ===== FOOTER ===== */
        .footer {
            background-color: #1e1e1e;
            color: #aaa;
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .masonry {
                column-count: 3;
            }
        }

        @media (max-width: 968px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-menu {
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }

            .masonry {
                column-count: 2;
            }

            .lightbox-prev {
                left: 10px;
            }

            .lightbox-next {
                right: 10px;
            }
        }

        @media (max-width: 600px) {
            .masonry {
                column-count: 1;
            }

            .portfolio-header h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <span class="logo-text">M&A TEX</span>
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="our-story.html">OUR STORY</a></li>
                <li><a href="our-impact.html">OUR IMPACT</a></li>
                <li><a href="recognitions.html">RECOGNITIONS</a></li>
                <li><a href="craft.html">CRAFT</a></li>
                <li><a href="portfolio.html" class="active">PORTFOLIO</a></li>
                <li><a href="#contact">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="portfolio-header">
        <div class="portfolio-header-content" data-aos="fade-up">
            <span class="number" data-aos="fade-down">— OUR WORK —</span>
            <h1 data-aos="fade-up" data-aos-delay="100">Portfolio</h1>
            <div class="subhead" data-aos="fade-up" data-aos-delay="200">
                A curated selection of our finest pieces, crafted for the world's most discerning brands.
            </div>
        </div>
    </header>

    <!-- FILTROS (OPCIONAL) -->
    <section class="filters-section" data-aos="fade-up">
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">ALL</button>
            <button class="filter-btn" data-filter="knitwear">KNITWEAR</button>
            <button class="filter-btn" data-filter="accessories">ACCESSORIES</button>
            <button class="filter-btn" data-filter="runway">RUNWAY</button>
            <button class="filter-btn" data-filter="details">DETAILS</button>
        </div>
    </section>

    <!-- COLLAGE ASIMÉTRICO -->
    <section class="portfolio-grid">
        <div class="masonry" id="masonryGrid">
            <!-- Las imágenes se cargarán con JavaScript para tener control de filtros -->
        </div>
    </section>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <button class="lightbox-prev" onclick="changeImage(-1)">‹</button>
        <button class="lightbox-next" onclick="changeImage(1)">›</button>
        <div class="lightbox-content" id="lightboxContent">
            <img src="" alt="" id="lightboxImg">
        </div>
        <div class="lightbox-info" id="lightboxInfo"></div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2025 Madres & Artesanas Tex · Crafted with tradition</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Datos del portfolio
        const portfolioItems = [
            {
                id: 1,
                src: 'assets/images/2.png',
                category: 'knitwear',
                title: 'Cable Knit Sweater',
                description: 'Hand-knitted merino wool',
                size: 'medium' // tamaño normal
            },
            {
                id: 2,
                src: 'assets/images/6.png',
                category: 'details',
                title: 'Crochet Detail',
                description: 'Intricate hand crochet',
                size: 'tall' // más alto
            },
            {
                id: 3,
                src: 'assets/images/7.png',
                category: 'accessories',
                title: 'Wool Scarf',
                description: 'Hand-fringed edges',
                size: 'wide' // más ancho
            },
            {
                id: 4,
                src: 'assets/images/11.png',
                category: 'details',
                title: 'Bead Appliqué',
                description: 'Hand-sewn beads',
                size: 'medium'
            },
            {
                id: 5,
                src: 'assets/images/13.png',
                category: 'runway',
                title: 'Runway Collection',
                description: 'New York Fashion Week',
                size: 'large' // extra grande
            },
            {
                id: 6,
                src: 'assets/images/14.png',
                category: 'accessories',
                title: 'Embroidered Bag',
                description: 'Traditional motifs',
                size: 'medium'
            },
            {
                id: 7,
                src: 'assets/images/15.png',
                category: 'knitwear',
                title: 'Alpaca Cardigan',
                description: 'Baby alpaca wool',
                size: 'tall'
            },
            {
                id: 8,
                src: 'assets/images/16.png',
                category: 'runway',
                title: 'Evening Collection',
                description: 'Silk and wool blend',
                size: 'medium'
            },
            {
                id: 9,
                src: 'assets/images/Captura de pantalla 2026-02-07 192113.png',
                category: 'details',
                title: 'Hand-finished seams',
                description: 'Detail of construction',
                size: 'wide'
            },
            {
                id: 10,
                src: 'assets/images/Captura de pantalla 2026-02-07 192711 - copia.png',
                category: 'accessories',
                title: 'Macramé Wall Hanging',
                description: 'Home collection',
                size: 'tall'
            },
            {
                id: 11,
                src: 'assets/images/Captura de pantalla 2026-02-07 192725 - copia.png',
                category: 'knitwear',
                title: 'Textured Sweater',
                description: 'Mixed techniques',
                size: 'medium'
            },
            {
                id: 12,
                src: 'assets/images/00014-heirlome-spring-2026-ready-to-wear-credit-brand.webp',
                category: 'runway',
                title: 'Spring Collection 2026',
                description: 'Heirlome collaboration',
                size: 'large'
            },
            {
                id: 13,
                src: 'assets/images/gabriela hearst 2.jpg',
                category: 'runway',
                title: 'Gabriela Hearst',
                description: 'Fall/Winter collection',
                size: 'tall'
            },
            {
                id: 14,
                src: 'assets/images/00025-Gabriela-Hearst-Fall-22-RTW-New-York-credit-Isidore-Montag-Gorunway.webp',
                category: 'runway',
                title: 'New York Fashion Week',
                description: 'Backstage detail',
                size: 'wide'
            }
        ];

        let currentFilter = 'all';
        let currentImages = [];
        let currentIndex = 0;

        // Renderizar grid
        function renderGrid(filter = 'all') {
            const grid = document.getElementById('masonryGrid');
            const filteredItems = filter === 'all' 
                ? portfolioItems 
                : portfolioItems.filter(item => item.category === filter);
            
            grid.innerHTML = '';
            
            filteredItems.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `masonry-item ${item.size || ''}`;
                itemDiv.setAttribute('data-category', item.category);
                itemDiv.setAttribute('data-index', index);
                itemDiv.onclick = () => openLightbox(index, filteredItems);
                
                itemDiv.innerHTML = `
                    <img src="${item.src}" alt="${item.title}" loading="lazy">
                    <span class="item-tag">${item.category}</span>
                    <div class="item-overlay">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                `;
                
                grid.appendChild(itemDiv);
            });

            currentImages = filteredItems;
        }

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Actualizar botón activo
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // Filtrar
                currentFilter = this.getAttribute('data-filter');
                renderGrid(currentFilter);
            });
        });

        // Lightbox
        function openLightbox(index, images) {
            currentIndex = index;
            currentImages = images;
            
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            const info = document.getElementById('lightboxInfo');
            
            img.src = images[index].src;
            img.alt = images[index].title;
            info.textContent = `${images[index].title} — ${images[index].description}`;
            
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function changeImage(direction) {
            currentIndex += direction;
            
            if (currentIndex < 0) {
                currentIndex = currentImages.length - 1;
            } else if (currentIndex >= currentImages.length) {
                currentIndex = 0;
            }
            
            const img = document.getElementById('lightboxImg');
            const info = document.getElementById('lightboxInfo');
            
            img.src = currentImages[currentIndex].src;
            img.alt = currentImages[currentIndex].title;
            info.textContent = `${currentImages[currentIndex].title} — ${currentImages[currentIndex].description}`;
        }

        // Tecla ESC para cerrar lightbox
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowLeft' && document.getElementById('lightbox').classList.contains('active')) {
                changeImage(-1);
            } else if (e.key === 'ArrowRight' && document.getElementById('lightbox').classList.contains('active')) {
                changeImage(1);
            }
        });

        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 1000,
                once: true,
                offset: 100,
                easing: 'ease-out-cubic'
            });

            // Renderizar grid inicial
            renderGrid('all');

            // Navbar scroll
            const navbar = document.querySelector('.navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        });
    </script>
</body>
</html>
